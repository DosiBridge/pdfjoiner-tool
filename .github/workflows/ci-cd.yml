name: Full CI/CD - Build, Push, and Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose*.yml'
      - '.github/workflows/ci-cd.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production after building images'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: pdfjoiner-production-${{ github.ref }}
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/pdf-joiner-pro-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/pdf-joiner-pro-frontend

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      backend_image: ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
      frontend_image: ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_API_URL }}
            VITE_API_TARGET=${{ secrets.BACKEND_API_TARGET }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to Dapplesoft Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event.inputs.deploy == 'true')
    environment: production
    permissions:
      contents: read

    steps:
      - name: Prepare SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.PROD_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy latest images with existing Docker Compose
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          COMPOSE_FILE: ${{ secrets.PROD_COMPOSE_FILE }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "${PROD_PORT:-22}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            "${PROD_USER}@${PROD_HOST}" \
            "COMPOSE_FILE='${COMPOSE_FILE}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$(dirname "$COMPOSE_FILE")"
          echo "Deploying from compose file: $COMPOSE_FILE"
          docker compose -f "$COMPOSE_FILE" pull backend frontend
          docker compose -f "$COMPOSE_FILE" up -d --remove-orphans backend frontend
          docker compose -f "$COMPOSE_FILE" ps backend frontend
          REMOTE

      - name: Verify production health
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "${PROD_PORT:-22}" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            "${PROD_USER}@${PROD_HOST}" <<'REMOTE'
          set -euo pipefail
          echo "Checking backend API locally..."
          curl -fsS --max-time 20 http://127.0.0.1:8087/api/health >/tmp/pdfjoiner-backend-health.json
          python3 - <<'PY'
          import json
          with open('/tmp/pdfjoiner-backend-health.json') as f:
              data=json.load(f)
          assert data.get('status') == 'healthy', data
          print('Backend healthy:', data.get('version'))
          PY
          echo "Checking frontend locally..."
          curl -fsSI --max-time 20 http://127.0.0.1:8088/ | head -20
          echo "Checking Nginx vhosts locally with production hostnames..."
          curl -kfsSI --max-time 20 --resolve pdfjoiner.dosibridge.com:443:127.0.0.1 https://pdfjoiner.dosibridge.com/ | head -20
          curl -kfS --max-time 20 --resolve pdfjoinerapi.dosibridge.com:443:127.0.0.1 https://pdfjoinerapi.dosibridge.com/api/health | python3 -c "import sys,json; data=json.load(sys.stdin); assert data.get('status') == 'healthy', data; print('Nginx API vhost healthy:', data.get('version'))"
          echo "Checking containers..."
          docker ps --filter name=pdf-joiner --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
          REMOTE

      - name: Probe public Cloudflare domains non-blocking
        run: |
          set -euo pipefail
          echo "Cloudflare may challenge GitHub-hosted runners; local Nginx/API checks above are authoritative for deployment."
          curl -sSI --max-time 30 https://pdfjoiner.dosibridge.com/ | head -20 || true
          curl -sS --max-time 30 https://pdfjoinerapi.dosibridge.com/api/health | python3 -c "import sys,json; data=json.load(sys.stdin); print('Public API status:', data.get('status'), data.get('version'))" || true
