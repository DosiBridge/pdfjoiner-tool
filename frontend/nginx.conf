server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve generated SEO HTML for clean routes such as /merge-pdf without
    # redirecting to /merge-pdf/ or falling back to the homepage.
    location / {
        try_files $uri/index.html $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
}
